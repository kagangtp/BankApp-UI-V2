<div class="dashboard-wrapper">
    <div class="stats-container">

        <div class="custom-card">
            <div class="card-accent"></div>
            <div class="card-content">
                <div class="info-group">
                    <span class="label">TOPLAM MÜŞTERİ</span>
                    <span class="name">Sistem Kayıtlı Kullanıcı</span>
                </div>
                <div class="value-group text-primary">
                    {{ stats.totalCustomers }} Kişi
                </div>
                <div class="date-group">
                    {{ today | date:'dd MMM yyyy' }}
                </div>
                <div class="icon-group">
                    <div class="action-btn"><i class="bi bi-people"></i></div>
                </div>
            </div>
        </div>

        <div class="custom-card">
            <div class="card-accent"></div>
            <div class="card-content">
                <div class="info-group">
                    <span class="label">KASA TOPLAMI</span>
                    <span class="name">Toplam Mevduat</span>
                </div>
                <div class="value-group text-success">
                    {{ stats.totalBalance | currency:'USD' }}

                </div>
                <div class="date-group">
                    {{ today | date:'dd MMM yyyy' }}
                </div>
                <div class="icon-group">
                    <div class="action-btn"><i class="bi bi-wallet2"></i></div>
                </div>
            </div>
        </div>

    </div>

    <div class="chart-section mt-5">
        <div class="custom-card pie-chart-card">
            <canvas baseChart [data]="pieChartData" [options]="pieChartOptions" [type]="'pie'"></canvas>
        </div>
    </div>
</div>
