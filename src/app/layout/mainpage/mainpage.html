<div class="main-layout" 
     [class.sidebar-collapsed]="side.isCollapsed()" 
     [class.mobile-sidebar-open]="isMobileSidebarOpen">

  <app-navbar (hamburgerClick)="toggleMobileSidebar()"></app-navbar>

  <div class="mobile-backdrop" (click)="closeMobileSidebar()"></div>

  <app-sidebar #side></app-sidebar>

  <main class="content-area">
    <router-outlet></router-outlet>
  </main>

</div>
